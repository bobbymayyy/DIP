# Generated by MAY
# version=DIP-OL9.5

# PRE-INSTALL SCRIPTS
# -----------------------
%pre --log=/tmp/pre-install.log

LUKS_PASS=""
INITIAL_PASS=""

# SET THE OS/INSTALL DRIVE -------------------------------------------
# Detect all non-removable disks
DISKS=$(lsblk -dpno NAME,RO,TYPE,TRAN,MOUNTPOINTS | awk '$2 == 0 && $3 == "disk" && $4 != "usb" && $1 !~ "zram" {print $1}')

# Log detected disks
echo "Detected non-removable disks: $DISKS" >> /tmp/pre-install.log

# Wipe all detected disks
for DISK in $DISKS; do
    echo "Wiping $DISK..." >> /tmp/pre-install.log
    wipefs --all --force $DISK
    sgdisk --zap-all $DISK
    sync
    wipefs --all --force $DISK
    sgdisk --zap-all $DISK
    sync
done

# Select the FIRST (NOT BIGGEST) available disk for installation
INSTALL_DISK=$(echo "$DISKS" | head -n 1)

# Ensure we found a disk
if [ -z "$INSTALL_DISK" ]; then
    echo "No suitable installation disk found!" >> /tmp/pre-install.log
    exit 1
fi

echo "Selected disk for installation: $INSTALL_DISK" >> /tmp/pre-install.log

# Write install disk Kickstart directive
cat > /tmp/install_disk.ks <<EOF
ignoredisk --only-use=$INSTALL_DISK

clearpart --all --drives=$INSTALL_DISK --initlabel

part pv.116 --fstype="lvmpv" --ondisk=$INSTALL_DISK --grow --encrypted --passphrase=$LUKS_PASS --luks-version=luks2
part /boot/efi --fstype="efi" --ondisk=$INSTALL_DISK --size=600 --fsoptions="umask=0077,shortname=winnt"
part /boot --fstype="xfs" --ondisk=$INSTALL_DISK --size=1024

volgroup ol --pesize=4096 pv.116
logvol /home --fstype="xfs" --size=102400 --name=home --vgname=ol
logvol /tmp --fstype="xfs" --size=1024 --name=tmp --vgname=ol
logvol /var --fstype="xfs" --size=5120 --name=var --vgname=ol
logvol /var/tmp --fstype="xfs" --size=1024 --name=var_tmp --vgname=ol
logvol /var/log --fstype="xfs" --size=1024 --name=var_log --vgname=ol
logvol /var/log/audit --fstype="xfs" --size=512 --name=var_log_audit --vgname=ol
logvol swap --fstype="swap" --size=8192 --name=swap --vgname=ol
logvol / --fstype="xfs" --grow --percent 100 --name=root --vgname=ol
EOF

# SET THE INSTALLATION SOURCE DRIVE -------------------------------------------
# Detect the partition that contains the ISO
SOURCE_DISK=$(findmnt -n -o SOURCE -T /run/install/repo)

# If no partition is found, fallback to scanning block devices
if [ -z "$SOURCE_DISK" ]; then
    SOURCE_DISK=$(lsblk -rpo "NAME,MOUNTPOINT" | awk '$2 == "/run/install/repo" {print $1}')
fi

# Log the detected partition
echo "Detected installation partition: $SOURCE_DISK" >> /tmp/pre-install.log

# Fail if no partition was found
if [ -z "$SOURCE_DISK" ]; then
    echo "ERROR: Installation partition not found!" >> /tmp/pre-install.log
    exit 1
fi

# Write source disk Kickstart directive
echo "harddrive --dir= --partition=$SOURCE_DISK" > /tmp/source_disk.ks

# SET THE USER'S INITIAL PASSWORDS -------------------------------------------
# Write initial password Kickstart directive
echo "user --groups=wheel --name=defender --password=$INITIAL_PASS --gecos='defender'" > /tmp/dynamic_users.ks
echo "user --groups=wheel --name=nerdadmin --password=$INITIAL_PASS --gecos='nerdadmin'" >> /tmp/dynamic_users.ks
%end
# -----------------------

# INSTALL TYPE
graphical

# REPO(s)
repo --name="AppStream" --baseurl=file:///run/install/sources/mount-0000-hdd-device/AppStream # - ISO Install (Ventoy)
#repo --name="AppStream" --baseurl=http://10.10.10.1/selected_os/AppStream # - Network Install (iPXE)

# KDUMP
%addon com_redhat_kdump --disable
%end

# STIG
%addon com_redhat_oscap
    content-type = scap-security-guide
    datastream-id = scap_org.open-scap_datastream_from_xccdf_ssg-ol9-xccdf.xml
    xccdf-id = scap_org.open-scap_cref_ssg-ol9-xccdf.xml
    profile = xccdf_org.ssgproject.content_profile_stig_gui
%end

# KEYBOARD
keyboard --xlayouts='us'

# LANGUAGE
lang en_US.UTF-8

# NETWORK
network --bootproto=dhcp --device=link --noipv6 --activate
network --hostname=analyst

# DYNAMIC SOURCE CONFIGURATION
%include /tmp/source_disk.ks # - ISO Install (Ventoy)
#url --url="http://10.10.10.1/selected_os/" # - Network Install (iPXE)

# PACKAGES
%packages
@^workstation-product-environment
aide
audispd-plugins
audit
chrony
crypto-policies
fapolicyd
firewalld
gnutls-utils
initial-setup
libreswan
nss-tools
opensc
openscap
openscap-scanner
openssh-clients
openssh-server
openssl-pkcs11
pcsc-lite
policycoreutils
policycoreutils-python-utils
rng-tools
rsyslog
rsyslog-gnutls
s-nail
scap-security-guide
sudo
tmux
usbguard
-iprutils
-quagga
-rsh-server
-sendmail
-telnet-server
-tftp-server
-tuned
-vsftpd
dialog
ansible-core
wireshark
parted
jq
tcpdump
libreoffice
gedit
%end

# SETUP AGENT
firstboot --enable

# DYNAMIC INSTALL DRIVE CONFIGURATION
%include /tmp/install_disk.ks

# TIMEZONE
timezone America/New_York --utc

# ROOT PWD
rootpw --lock

# USERS
%include /tmp/dynamic_users.ks # - Comment to create your own account
